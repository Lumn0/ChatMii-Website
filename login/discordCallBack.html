
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
</head>
<body>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    if (code) {
      document.body.innerHTML += "<p>Done</p>";

      console.log("Discord code:", code);
    } else {
      document.body.innerHTML += "<p>Error</p>";
    }
  </script>
</body>
</html>
